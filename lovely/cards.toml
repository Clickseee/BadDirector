
[manifest]
version = "1.0.0"
dump_lua = true
priority = 9999999

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "_pool[#_pool + 1] = v.key"
position = "before"
payload = '''
if curr_deck and (curr_deck == "b_checkered" and G.GAME.bd_misprinted_deck == true) then
    if string.sub(v.key, 1, 6) == "j_bd_" then
        for i = 1, 4 do
            _pool[#_pool + 1] = v.key
            _pool_size = _pool_size + 1
        end
    end
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "back.lua"
pattern = "local obj = self.effect.center"
position = "after"
payload = '''
BadDirector.mem_deck_name = nil
if G.GAME.bd_misprinted_deck then
	local key = obj.key
	if not BadDirector.MisprintedDecks[key].keep_calculate then
		BadDirector.mem_deck_name = self.name
		self.name = "BadDirector Misprinted Deck IGNORE EFFECT"
		if BadDirector.MisprintedDecks[key].calculate then
			local old_obj = obj
			obj = {
				calculate = function(self, ...)
					return BadDirector.MisprintedDecks[key].calculate(old_object, ...)
				end
			}
		else obj = {} end
	end
end
'''
match_indent = true
count = 1


